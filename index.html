<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alejandro's Investment Roulette</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700;900&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { min-height: 100vh; }
  body {
    background: linear-gradient(160deg, #0d1117 0%, #1a1a2e 40%, #16213e 100%);
    font-family: 'Sora', sans-serif;
    color: #e0e0e0;
  }
  @keyframes pulseBorder {
    0%, 100% { box-shadow: 0 0 0 0 rgba(233,196,106,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(233,196,106,0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .layout-container { flex-direction: row; }
  @media (max-width: 900px) {
    .layout-container { flex-direction: column !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<script>
// ============================================================
// RIGGING CONFIGURATION
// ============================================================
var RIGGED = false;
// Segments alternate: investment, dumb, investment, dumb...
// Index 0  = Investment 1
// Index 1  = "Dates with Women"
// Index 2  = Investment 2
// Index 3  = "Dinner and Kissing Fights with the Homies"
// Index 4  = Investment 3
// Index 5  = "Useless Outdoor Gear"
// Index 6  = Investment 4
// Index 7  = "Mass Quantities of Drugs"
// Index 8  = Investment 5
// Index 9  = "Mexican Hot Sauce with Extra Lead"
var RIGGED_INDEX = 7;
// ============================================================

var h = React.createElement;
var useState = React.useState;
var useRef = React.useRef;
var useEffect = React.useEffect;
var useCallback = React.useCallback;

var DUMB_SEGMENTS = [
  { label: "Dates with Women", emoji: "\u{1F48B}", color: "#D62AD0",
    snark: "'Heyyy want to climb and get tacos after?' Yeah we've heard that one before... maybe it will finally lead to a meaningful relationship.",
    snark2: "Twice?? At this point just download Hinge and call it an investment.",
    snark3: "Three times. He's not dating, he's funding a restaurant's quarterly earnings." },
  { label: "Dinner and Kissing Fights with the Homies", emoji: "\u{1F91C}", color: "#E76F51",
    snark: "The homies have once again convinced him that Chili's and romantic violence is a valid expense.",
    snark2: "The homies won again. At this rate they should just move in together and split rent.",
    snark3: "Three times! The homies now have a standing reservation and a loyalty card at Chili's." },
  { label: "Useless Outdoor Gear", emoji: "\u{1F3D5}\uFE0F", color: "#C1121F",
    snark: "He now owns another titanium gadget he'll use once and lose in the canyon. We tried to stop him.",
    snark2: "Again? His garage is slowly becoming an REI clearance section.",
    snark3: "Three outdoor gear hits. He could sponsor a mountaineering expedition at this point." },
  { label: "Mass Quantities of Drugs", emoji: "\u{1F48A}", color: "#E63946",
    snark: "The pharmacist at Walgreens is going to judge him so hard for this Benadryl haul.",
    snark2: "Twice! The Walgreens cashier now knows him by first name.",
    snark3: "Three times. He is single-handedly keeping the pharmaceutical industry afloat." },
  { label: "Mexican Hot Sauce with Extra Lead", emoji: "\u{1F336}\uFE0F", color: "#9B2226",
    snark: "Brain cells are gone. Tongue is burning. He says it's worth it. It's not.",
    snark2: "Twice! His taste buds have filed a restraining order.",
    snark3: "Three hot sauce hits. At this point the lead content is a personality trait." },
];

var INVESTMENT_SNARKS = [
  "Against all odds, he's investing in something useful. Screenshot this before he changes his mind.",
  "Wait, the same good decision TWICE? Is the wheel broken or is he actually developing responsibility?",
  "THREE times on something useful?? Someone check if he's feeling okay. This isn't like him.",
];

var CHARITY_COLORS = ["#2A9D8F", "#3A6EA5", "#287271", "#5B6ABF", "#1B7A5A"];

// Word-wrap to fit progressively narrowing wedge
function wrapForWedge(text, halfAngle, radii, fontSize) {
  var lines = [];
  var words = text.split(" ");
  var cur = "";
  var cw = fontSize * 0.52;
  for (var w = 0; w < words.length; w++) {
    var test = cur ? cur + " " + words[w] : words[w];
    var li = lines.length;
    var r = li < radii.length ? radii[li] : radii[radii.length - 1];
    var avail = 2 * r * Math.sin(halfAngle) * 0.78;
    if (test.length * cw > avail && cur) {
      lines.push(cur);
      cur = words[w];
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function CharityRoulette() {
  var cs = useState(["", "", "", "", ""]);
  var charities = cs[0], setCharities = cs[1];
  var ps = useState("input");
  var phase = ps[0], setPhase = ps[1];
  var ss = useState(false);
  var spinning = ss[0], setSpinning = ss[1];
  var rs = useState(null);
  var result = rs[0], setResult = rs[1];
  var rots = useState(0);
  var rotation = rots[0], setRotation = rots[1];
  var cfs = useState(false);
  var showConfetti = cfs[0], setShowConfetti = cfs[1];
  var hcs = useState({});
  var hitCounts = hcs[0], setHitCounts = hcs[1];
  var canvasRef = useRef(null);
  var spinLock = useRef(false);

  var segments = [];
  for (var i = 0; i < 5; i++) {
    segments.push({ label: charities[i] || ("Investment " + (i + 1)), emoji: "\u{1F397}\uFE0F", color: CHARITY_COLORS[i], isCharity: true, snark: "" });
    var ds = DUMB_SEGMENTS[i];
    segments.push({ label: ds.label, emoji: ds.emoji, color: ds.color, isCharity: false, snark: ds.snark, snark2: ds.snark2, snark3: ds.snark3 });
  }

  var totalSegs = segments.length;
  var segAngle = 360 / totalSegs;

  var handleSpin = useCallback(function() {
    if (spinning || spinLock.current) return;
    spinLock.current = true;
    setSpinning(true);
    setResult(null);
    setShowConfetti(false);
    var ti;
    if (RIGGED) { ti = RIGGED_INDEX % totalSegs; }
    else { ti = Math.floor(Math.random() * totalSegs); }
    var jitter = (Math.random() - 0.5) * segAngle * 0.5;
    var spins = 5 + Math.floor(Math.random() * 3);
    var desiredMod = ((360 - ti * segAngle - segAngle / 2) % 360 + 360) % 360;
    var currentMod = ((rotation % 360) + 360) % 360;
    var delta = ((desiredMod - currentMod) % 360 + 360) % 360;
    var target = spins * 360 + delta + jitter;
    var nr = rotation + target;
    setRotation(nr);
    var segs = segments;
    var curCounts = hitCounts;
    setTimeout(function() {
      spinLock.current = false;
      setSpinning(false);
      var seg = segs[ti];
      var count = (curCounts[ti] || 0) + 1;
      var msg;
      if (seg.isCharity) {
        if (count === 1) msg = INVESTMENT_SNARKS[0];
        else if (count === 2) msg = INVESTMENT_SNARKS[1];
        else if (count === 3) msg = INVESTMENT_SNARKS[2];
        else msg = "Again? Wow! That's crazy...";
      } else {
        if (count === 1) msg = seg.snark;
        else if (count === 2) msg = seg.snark2;
        else if (count === 3) msg = seg.snark3;
        else msg = "Again? Wow! That's crazy...";
      }
      var newCounts = {};
      for (var k in curCounts) newCounts[k] = curCounts[k];
      newCounts[ti] = count;
      setHitCounts(newCounts);
      setResult({ label: seg.label, emoji: seg.emoji, isCharity: seg.isCharity, color: seg.color, message: msg });
      if (seg.isCharity) setShowConfetti(true);
    }, 4500);
  }, [spinning, rotation, totalSegs, segAngle, segments, hitCounts]);

  useEffect(function() {
    if (!showConfetti || !canvasRef.current) return;
    var canvas = canvasRef.current;
    var ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    var cols = ["#2A9D8F", "#E9C46A", "#F4A261", "#E63946", "#264653", "#6A0572"];
    var pts = [];
    for (var p = 0; p < 150; p++) {
      pts.push({ x: Math.random() * canvas.width, y: Math.random() * -canvas.height,
        w: 4 + Math.random() * 6, h: 8 + Math.random() * 10,
        color: cols[Math.floor(Math.random() * 6)],
        vy: 1.5 + Math.random() * 3, vx: (Math.random() - 0.5) * 2,
        rot: Math.random() * 360, vr: (Math.random() - 0.5) * 8 });
    }
    var frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var alive = false;
      pts.forEach(function(p) {
        p.y += p.vy; p.x += p.vx; p.rot += p.vr;
        if (p.y < canvas.height + 20) alive = true;
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      if (alive) frame = requestAnimationFrame(draw);
    }
    draw();
    return function() { cancelAnimationFrame(frame); };
  }, [showConfetti]);

  function drawWheel() {
    var size = 620;
    var cx = size / 2, cy = size / 2, r = size / 2 - 10;
    var aps = 2 * Math.PI / totalSegs;
    var half = aps / 2;
    var textR = [r * 0.74, r * 0.62, r * 0.50, r * 0.40, r * 0.30];
    var bfs = 13;

    var els = segments.map(function(seg, i) {
      var sa = i * aps - Math.PI / 2;
      var ea = sa + aps;
      var x1 = cx + r * Math.cos(sa), y1 = cy + r * Math.sin(sa);
      var x2 = cx + r * Math.cos(ea), y2 = cy + r * Math.sin(ea);
      var la = aps > Math.PI ? 1 : 0;
      var ma = sa + half;
      var rd = ma * 180 / Math.PI;

      var er = r * 0.88;
      var ex = cx + er * Math.cos(ma), ey = cy + er * Math.sin(ma);

      var lines = wrapForWedge(seg.label, half, textR, bfs);

      var ch = [
        h("path", { key: "p",
          d: "M" + cx + "," + cy + " L" + x1 + "," + y1 + " A" + r + "," + r + " 0 " + la + " 1 " + x2 + "," + y2 + " Z",
          fill: seg.color, stroke: "#0d1117", strokeWidth: "2" }),
        h("text", { key: "e", x: ex, y: ey, textAnchor: "middle", dominantBaseline: "central",
          transform: "rotate(" + (rd + 90) + "," + ex + "," + ey + ")",
          style: { fontSize: "24px" } }, seg.emoji),
      ];

      for (var li = 0; li < lines.length && li < textR.length; li++) {
        var tr = textR[li];
        var tx = cx + tr * Math.cos(ma), ty = cy + tr * Math.sin(ma);
        var fs = Math.max(10, bfs - li * 1);
        ch.push(h("text", { key: "t" + li, x: tx, y: ty,
          textAnchor: "middle", dominantBaseline: "central",
          transform: "rotate(" + (rd + 90) + "," + tx + "," + ty + ")",
          style: { fontSize: fs + "px", fontFamily: "'Sora',sans-serif", fontWeight: 600, fill: "#fff",
            textShadow: "0 1px 3px rgba(0,0,0,0.6)" }
        }, lines[li]));
      }
      return h("g", { key: i }, ch);
    });

    return h("svg", { width: "100%", height: "100%", viewBox: "0 0 " + size + " " + size,
      style: { display: "block" } }, [
      h("defs", { key: "d" }, h("filter", { id: "ws" },
        h("feDropShadow", { dx: "0", dy: "6", stdDeviation: "12", floodOpacity: "0.4" }))),
      h("circle", { key: "bg", cx: cx, cy: cy, r: r + 8, fill: "#1a1a2e", filter: "url(#ws)" }),
      h("g", { key: "s" }, els),
      h("circle", { key: "c", cx: cx, cy: cy, r: 34, fill: "#1a1a2e", stroke: "#E9C46A", strokeWidth: "4" }),
      h("text", { key: "i", x: cx, y: cy, textAnchor: "middle", dominantBaseline: "central",
        style: { fontSize: "22px" } }, "\u{1F3B0}"),
    ]);
  }

  // ============ INPUT PHASE ============
  if (phase === "input") {
    var fields = charities.map(function(c, i) {
      return h("div", { key: i, style: { marginBottom: 12 } },
        h("input", { type: "text",
          placeholder: 'Investment ' + (i + 1),
          value: c,
          onChange: (function(idx) { return function(e) {
            var n = charities.slice(); n[idx] = e.target.value; setCharities(n);
          }})(i),
          style: { width: "100%", padding: "12px 14px", borderRadius: 8,
            border: "1px solid rgba(255,255,255,0.1)", background: "rgba(0,0,0,0.3)",
            color: "#e0e0e0", fontSize: 14, fontFamily: "'Sora',sans-serif", outline: "none" },
          onFocus: function(e) { e.target.style.borderColor = "#2A9D8F"; },
          onBlur: function(e) { e.target.style.borderColor = "rgba(255,255,255,0.1)"; },
        })
      );
    });
    var ok = charities.some(function(c) { return c.trim(); });
    return h("div", { style: { minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: "40px 20px" } },
      h("div", { style: { textAlign: "center", marginBottom: 40 } },
        h("h1", { style: { fontFamily: "'Passion One',sans-serif", fontSize: "clamp(2.5rem,6vw,4rem)",
          fontWeight: 900, background: "linear-gradient(135deg,#E9C46A 0%,#F4A261 50%,#E63946 100%)",
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", lineHeight: 1.1, marginBottom: 8 }
        }, "INVESTMENT ROULETTE"),
        h("p", { style: { fontSize: 14, color: "#f5eded", fontStyle: "italic", maxWidth: 400, margin: "0 auto" } },
          "Help Alejandro do the right thing with his money (he won't)")
      ),
      h("div", { style: { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
        borderRadius: 16, padding: "32px 28px", maxWidth: 440, width: "100%" } },
        h("h2", { style: { fontFamily: "'Passion One',sans-serif", fontSize: 22, color: "#2A9D8F", marginBottom: 6 } },
          "\u{1F397}\uFE0F Pick 5 Investments"),
        h("p", { style: { fontSize: 12, color: "#f5eded", marginBottom: 20 } },
          "Where should the money go?"),
        fields,
        h("button", { onClick: function() { setPhase("wheel"); }, disabled: !ok,
          style: { marginTop: 12, width: "100%", padding: "14px", borderRadius: 10, border: "none",
            background: ok ? "linear-gradient(135deg,#E9C46A,#F4A261)" : "#333",
            color: ok ? "#0d1117" : "#666", fontFamily: "'Passion One',sans-serif",
            fontSize: 20, fontWeight: 700, cursor: ok ? "pointer" : "not-allowed", letterSpacing: 1 }
        }, "BUILD THE WHEEL \u2192")
      )
    );
  }

  // ============ WHEEL PHASE ============
  var left = h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center",
    justifyContent: "center", gap: 24, padding: "30px 24px", flex: "0 0 auto",
    width: "100%", maxWidth: 420 } },
    h("h1", { style: { fontFamily: "'Passion One',sans-serif", fontSize: "clamp(2.2rem,4vw,3.4rem)",
      fontWeight: 900, background: "linear-gradient(135deg,#E9C46A 0%,#F4A261 50%,#E63946 100%)",
      WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", textAlign: "center" }
    }, "INVESTMENT ROULETTE"),
    h("p", { style: { fontSize: 13, color: "#f5eded", fontStyle: "italic", textAlign: "center", maxWidth: 300 } },
      "Help Alejandro do the right thing with his money (he won't)"),
    h("button", { onClick: handleSpin, disabled: spinning,
      style: { padding: "16px 48px", borderRadius: 50, border: "3px solid #E9C46A",
        background: spinning ? "rgba(233,196,106,0.1)" : "linear-gradient(135deg,#E9C46A,#F4A261)",
        color: spinning ? "#E9C46A" : "#0d1117", fontFamily: "'Passion One',sans-serif",
        fontSize: 26, fontWeight: 900, cursor: spinning ? "not-allowed" : "pointer",
        letterSpacing: 2, whiteSpace: "nowrap",
        animation: !spinning && !result ? "pulseBorder 2s infinite" : "none" }
    }, spinning ? "SPINNING..." : "\u{1F3B0} SPIN THE WHEEL"),
    result ? h("div", { style: { padding: "20px 24px", borderRadius: 14,
      background: result.isCharity ? "rgba(42,157,143,0.15)" : "rgba(230,57,70,0.12)",
      border: "2px solid " + (result.isCharity ? "#2A9D8F" : "#E63946"),
      textAlign: "center", maxWidth: 360, width: "100%", animation: "fadeIn 0.4s ease" } },
      h("p", { style: { fontSize: 36, marginBottom: 6 } }, result.emoji),
      h("p", { style: { fontFamily: "'Passion One',sans-serif", fontSize: 24,
        color: result.isCharity ? "#2A9D8F" : "#E63946" } }, result.label),
      h("p", { style: { fontSize: 12, color: "#888", marginTop: 8 } }, result.message)
    ) : null,
    h("button", { onClick: function() { setPhase("input"); setResult(null); setRotation(0); setShowConfetti(false); setHitCounts({}); },
      style: { padding: "8px 20px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)",
        background: "transparent", color: "#666", fontSize: 12, cursor: "pointer",
        fontFamily: "'Sora',sans-serif" }
    }, "\u2190 Edit Investments")
  );

  var right = h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center",
    justifyContent: "center", flex: "1 1 auto", minWidth: 0, padding: "20px" } },
    h("div", { style: { width: 0, height: 0, borderLeft: "18px solid transparent",
      borderRight: "18px solid transparent", borderTop: "36px solid #E9C46A",
      marginBottom: -10, zIndex: 5, filter: "drop-shadow(0 2px 6px rgba(0,0,0,0.5))" } }),
    h("div", { style: { transition: spinning ? "transform 4.5s cubic-bezier(0.17,0.67,0.12,0.99)" : "none",
      transform: "rotate(" + rotation + "deg)", width: "min(620px, 85vmin)", maxWidth: 620 }
    }, drawWheel())
  );

  return h("div", { style: { minHeight: "100vh", display: "flex", position: "relative", overflow: "hidden" } },
    showConfetti ? h("canvas", { ref: canvasRef, style: { position: "absolute", top: 0, left: 0,
      width: "100%", height: "100%", pointerEvents: "none", zIndex: 10 } }) : null,
    h("div", { className: "layout-container", style: { display: "flex", width: "100%",
      minHeight: "100vh", alignItems: "center", justifyContent: "center" } },
      left, right
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(CharityRoulette));
</script>
</body>
</html>
